
import sys
import os 
import webbrowser 

from PySide6.QtWidgets import (
    QApplication,
    QWidget,
    QVBoxLayout,
    QPushButton,
    QTextEdit,
    QLabel,
    QSplashScreen,
    QMessageBox
)


from PySide6.QtGui import QPixmap, QIcon 
from PySide6.QtCore import QTimer

from analyzer import analyze
def resource_path(relative_path):
    base_path = getattr(sys, "_MEIPASS", os.path.abspath("."))
    return os.path.join(base_path, relative_path)
ICON_PATH = resource_path("assets/icon.png")
SPLASH_PATH = resource_path("assets/splash.png")



class QRApp(QWidget):
    def __init__(self):
        super().__init__()

        self.setWindowTitle("QR Anti-Scam")
        self.setWindowIcon(QIcon(ICON_PATH))
        self.setMinimumWidth(420)

        layout = QVBoxLayout()

        # Info label
        info = QLabel("Paste QR content or link below:")
        layout.addWidget(info)

        disclaimer = QLabel(
            "Disclaimer: This tool provides a heuristic risk estimate only.\n"
            "Do not rely on it as the sole decision factor.\n"
            "Always verify the sender and the URL before opening."
        )
        disclaimer.setWordWrap(True)
        disclaimer.setStyleSheet("color:#9aa0a6; font-size:11px;")
        layout.addWidget(disclaimer)

        # Input
        self.input = QTextEdit()
        self.input.setPlaceholderText("https://example.com")
        layout.addWidget(self.input)

        # Analyze button
        self.scan_btn = QPushButton("Analyze")
        self.scan_btn.clicked.connect(self.run_analysis)
        layout.addWidget(self.scan_btn)

        # Open link button
        self.open_btn = QPushButton("Open link")
        self.open_btn.setEnabled(False)
        self.open_btn.clicked.connect(self.open_link)
        layout.addWidget(self.open_btn)

        # Result label
        self.result = QLabel("")
        self.result.setWordWrap(True)
        layout.addWidget(self.result)

        self.setLayout(layout)
        self.apply_dark_theme()

    # ---------------- RUN ANALYSIS ----------------
    def run_analysis(self):
        text = self.input.toPlainText().strip()

        # UX polish – normalize input
        lower = text.lower()
        if lower.startswith("www."):
            text = "https://" + text
        elif "://" not in text and "." in text and " " not in text:
            text = "https://" + text

        if not text:
            self.result.setText("")
            self.open_btn.setEnabled(False)
            return

        result = analyze(text)

        self.last_input = text
        is_url = text.startswith(("http://", "https://")) and "." in text
        self.open_btn.setEnabled(is_url)

        verdict = result.get("verdict", "UNKNOWN")
        reasons_list = result.get("reasons", [])
        score = result.get("score", 0)

        reasons = (
            "<br>• " + "<br>• ".join(reasons_list)
            if reasons_list
            else "<br>No details available."
        )

        color = {
            "SAFE": "#00ff9c",
            "LOW RISK": "#00ff9c",
            "SUSPICIOUS": "#ffcc00",
            "DANGEROUS": "#ff4c4c",
        }.get(verdict, "#e6e6e6")

        self.result.setStyleSheet(f"color:{color}; font-size:14px;")
        self.result.setText(
            f"<div style='margin-top:10px;'>"
            f"<h2 style='color:{color};'>{verdict}</h2>"
            f"<p style='margin:0; opacity:0.9;'><b>Score:</b> {score}</p>"
            f"<p><b>Details:</b>{reasons}</p>"
            f"</div>"
        )

        # 🔥 POPUP pentru DANGEROUS
        if verdict == "DANGEROUS":
            QMessageBox.critical(
                self,
                "⚠️ Dangerous QR Detected",
                "This QR code or link is considered DANGEROUS.\n\n"
                "It is strongly recommended NOT to open it."
            )

    # ---------------- OPEN LINK ----------------
    def open_link(self):
        if hasattr(self, "last_input") and self.last_input.startswith(("http://", "https://")):
            webbrowser.open(self.last_input)

    # ---------------- THEME ----------------
    def apply_dark_theme(self):
        self.setStyleSheet("""
            QWidget {
                background-color: #0b0b0f;
                color: #e6e6e6;
                font-size: 14px;
            }
            QPushButton {
                background-color: #1a1a22;
                padding: 10px;
                border-radius: 6px;
            }
            QTextEdit {
                background-color: #111118;
                border: 1px solid #222;
            }
        """)


if __name__ == "__main__":
    app = QApplication(sys.argv)

    # Splash screen
    splash_pix = QPixmap(SPLASH_PATH)  # imaginea ta
    splash = QSplashScreen(splash_pix)
    splash.show()

    # Fereastra principală
    window = QRApp()

    # După 1.5 secunde se închide splash-ul și apare aplicația
    def show_main():
        window.show()
        splash.finish(window)

    QTimer.singleShot(2000, show_main)


    sys.exit(app.exec())

