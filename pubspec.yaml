name: as_anti_scam_app
description: QR Anti-Scam App
publish_to: "none"

version: 1.0.0+12

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.2.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/icon.png

flutter_launcher_icons:
  image_path: assets/icons/icon.png

  android: true
  ios: true

  web:
    generate: true
    image_path: assets/icons/icon.png

  windows:
    generate: true
    image_path: assets/icons/icon.png

  macos:
    generate: true
    image_path: assets/icons/icon.png

  linux:
    generate: true
    image_path: assets/icons/icon.png
